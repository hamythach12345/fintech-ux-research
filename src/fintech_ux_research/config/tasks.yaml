user_research_task:
  description: >
    🇻🇳 NGÔN NGỮ BẮT BUỘC: Toàn bộ output bằng TIẾNG VIỆT.
    Heading, label, body text, terminology - tất cả tiếng Việt.
    Chỉ giữ nguyên: tên thương hiệu (Grab, MoMo), thuật ngữ kỹ 
    thuật không có bản dịch tốt (CAC, LTV, CTR, KPI), tên người.

    Research về: "{feature_name}"
    
    DOMAIN: {domain}
    TIME SCOPE: {time_scope}
    MARKET: {market}
    USER HINT: {user_segment}
    
    MIXED-METHODS METHODOLOGY (BẮT BUỘC):
    
    PART A - HARD DATA (định lượng):
    - Market size + growth (có source + year)
    - Survey stats (n=sample, methodology)
    - Analytics data, competitor metrics
    - Mỗi claim: [Source] [Year] [Sample]
    - Thiếu source: flag [needs verification]
    
    PART B - HUMAN TRUTH (định tính):
    - Reddit/forum quotes (thread có engagement cao)
    - App store reviews verbatim (negative sentiment)
    - Social listening (FB group, TikTok)
    - Interview quotes hoặc case studies
    - Language patterns (từ khoá user lặp lại)
    - Weird workarounds signal hidden problem
    
    PART C - SEGMENTATION (5-7 personas):
    Mỗi persona có:
    - Demographics (age, role, location)
    - Psychographics (motivation, fear)
    - Income/budget bracket
    - Job-to-be-done
    - Trigger & barrier riêng
    
    PART D - ISSUE TREE (>= 3 tầng):
    Behavior → Immediate reason → Deeper → Root cause
    
    PART E - SLICE DATA:
    Cắt theo segment, income, geography, motivation.
    Không đưa số tổng thể "chung chung".
    
    Brief thêm:
    - Loại: {research_type}
    - Mục đích: {purpose}
    - Độ sâu: {depth}
    - Context: {extra_context}
  expected_output: >
    Raw research data Markdown có đầy đủ:
    
    ## 1. Hard Data (source + sample)
    ## 2. Human Truth (Reddit, reviews, language patterns)
    ## 3. Personas Breakdown (5-7)
    ## 4. Issue Tree Analysis (root cause)
    ## 5. Sliced Data (theo segment/income/geo)
    ## 6. Competitor Intelligence
    ## 7. Weird Signals (anomalies, workarounds)
  agent: ux_researcher

synthesis_task:
  description: >
    🇻🇳 NGÔN NGỮ BẮT BUỘC: Toàn bộ output bằng TIẾNG VIỆT.
    Heading, label, body text, terminology - tất cả tiếng Việt.
    Chỉ giữ nguyên: tên thương hiệu (Grab, MoMo), thuật ngữ kỹ 
    thuật không có bản dịch tốt (CAC, LTV, CTR, KPI), tên người.

    Xây 5 insights BẮT BUỘC có 2 loại:
    
    LOẠI A - CAUSAL INSIGHTS (3-4 cái):
    Pattern: "[Segment cụ thể] vì [root cause] nên [behavior 
    quantified], dẫn đến [commercial opportunity với math]."
    
    LOẠI B - CONTRARIAN INSIGHTS (1-2 cái - BẮT BUỘC):
    Phá vỡ assumption phổ biến. Apply 3 technique:
    1. INVERT assumption: X → Y thực ra là Y → X? hay Z?
    2. SEGMENT SURPRISE: segment bất ngờ khác expected?
    3. STATED vs REVEALED: user nói A, hành vi cho thấy B?
    
    Pattern contrarian:
    - "Người mua X không thực sự muốn X, họ muốn tránh Y"
    - "Segment willing-to-pay cao nhất không phải A, mà B"
    - "Best practice ngành phản tác dụng với segment này"
    
    Self-check mỗi insight (7/7):
    ✅ Segment cụ thể (demo + psycho + income)
    ✅ Why-chain >= 3 tầng
    ✅ Commercial implication
    ✅ Evidence có source
    ✅ Quantification
    ✅ Actionable
    ✅ "Wait, really?" moment
    
    OUTPUT STRUCTURE:
    
    1. Executive Summary (3 câu: context, biggest insight, 
       commercial implication)
    
    2. Segmentation Matrix (bảng 5-7 persona với: 
       Size / Income / Trigger / Barrier / Price sensitivity / 
       Preferred format)
    
    3. Top 5 Insights:
       - 3-4 Causal Insights
       - 1-2 Contrarian Insights (FLAG rõ là contrarian)
       - Mỗi insight có evidence source
    
    4. Strategic Opportunities (3-5)
    
    5. Recommendations (3-5) BẮT BUỘC có:
       - Action name specific
       - Target segment chính xác
       - Offer/price cụ thể
       - Acquisition channel
       - CAC target
       - KPI leading (weekly) + lagging (quarterly)
       - Timeline + priority
    
    6. Risks & open questions
    
    Domain: {domain}, Time scope: {time_scope}
  expected_output: >
    Insight Report v1 với mix causal + contrarian insights,
    segmentation matrix, recommendation có đầy đủ CAC + KPI.
  agent: insight_synthesizer
  context:
    - user_research_task

review_task:
  description: >
    🇻🇳 NGÔN NGỮ BẮT BUỘC: Toàn bộ output bằng TIẾNG VIỆT.
    Heading, label, body text, terminology - tất cả tiếng Việt.
    Chỉ giữ nguyên: tên thương hiệu (Grab, MoMo), thuật ngữ kỹ 
    thuật không có bản dịch tốt (CAC, LTV, CTR, KPI), tên người.

    Review theo "DECISION-GRADE STANDARD".
    
    7-POINT TEST mỗi insight:
    1. Segment cụ thể (demo + psycho + income)?
    2. Why-chain >= 3 tầng?
    3. Commercial implication?
    4. Evidence + source + sample?
    5. Quantification?
    6. Actionable cho strategic decision?
    7. Ah-ha moment?
    
    Score: N/7 mỗi insight.
    
    BẮT BUỘC CHECK:
    - Có >= 1 contrarian insight không? (nếu không → REVISE)
    - Segmentation có 5+ persona không?
    - Evidence có % data points có source?
    - Recommendation có CAC + KPI không?
    
    5-POINT TEST mỗi recommendation:
    R1: Target segment cụ thể?
    R2: Offer/price cụ thể?
    R3: Acquisition channel cụ thể?
    R4: CAC target + KPI (leading + lagging)?
    R5: Timeline/priority rõ?
    
    RED FLAGS auto REVISE:
    ❌ "Người học", "user", "khách hàng" không segment
    ❌ "Theo khảo sát cho thấy..." không source
    ❌ "Launch micro-course" không price/channel
    ❌ Observation không why-chain
    ❌ KHÔNG có contrarian insight nào
    
    QUYẾT ĐỊNH:
    - 5/5 insights >= 6/7 + >= 1 contrarian + 4/5 rec >= 4/5: PASS
    - 3-4/5 insights >= 5/7: REVISE
    - Còn lại: FAIL
    
    OUTPUT FORMAT:
    
    REVIEW VERDICT: [PASS | REVISE | FAIL]
    
    INSIGHT ANALYSIS:
    Insight #1 [Causal/Contrarian]: "[10 từ đầu]..."
    - Test 1-7 (Y/N + feedback specific)
    - Score: N/7
    
    [Repeat cho insights 2-5]
    
    CONTRARIAN CHECK: [có X contrarian - OK/missing]
    SEGMENTATION CHECK: [pass/partial/fail]
    RECOMMENDATIONS CHECK:
    Rec #1: N/5 - [feedback]
    [Repeat cho rec 2-5]
    
    STRENGTHS:
    - [specific]
    
    CRITICAL FIXES NEEDED:
    - FIX #1: [Insight X cần bổ sung Y theo hướng Z]
    - FIX #2: [...]
    
    FINAL ASSESSMENT: [2 câu - report có sẵn sàng cho 
    strategic decision không?]
  expected_output: >
    Review report tiếng Việt khắt khe, feedback specific 
    theo từng insight/rec.
  agent: quality_reviewer
  context:
    - synthesis_task

revision_task:
  description: >
    🇻🇳 NGÔN NGỮ BẮT BUỘC: Toàn bộ output bằng TIẾNG VIỆT.
    Heading, label, body text, terminology - tất cả tiếng Việt.
    Chỉ giữ nguyên: tên thương hiệu (Grab, MoMo), thuật ngữ kỹ 
    thuật không có bản dịch tốt (CAC, LTV, CTR, KPI), tên người.

    Sửa theo REQUIRED FIXES. Giữ nguyên phần đã tốt.
    ĐẶC BIỆT: không water down contrarian insight chỉ vì 
    strict review - giữ cái "wait, really?" element.
    
    Với mỗi insight bị fail test nào, bổ sung element đó:
    - Fail Test 1: chỉ rõ demo + psycho + income
    - Fail Test 2: decompose xuống 3 tầng
    - Fail Test 3: thêm business math ngầm
    - Fail Test 4: tìm source hoặc flag [needs verification]
    - Fail Test 5: thêm số cụ thể
    - Fail Test 6: reader có thể ra decision
    - Fail Test 7: thêm counter-intuitive element
    
    Nếu report thiếu contrarian insight → TẠO thêm 1-2 cái 
    bằng technique:
    - Invert assumption
    - Segment surprise
    - Stated vs revealed
    
    Đầu report thêm REVISION NOTES ghi rõ đã fix gì.
    
    Domain: {domain}, Topic: "{feature_name}", Time scope: {time_scope}
  expected_output: >
    Insight Report v2 với fixes applied, contrarian được 
    preserve/bổ sung, REVISION NOTES ở đầu.
  agent: insight_synthesizer
  context:
    - synthesis_task
    - review_task

re_review_task:
  description: >
    🇻🇳 NGÔN NGỮ BẮT BUỘC: Toàn bộ output bằng TIẾNG VIỆT.
    Heading, label, body text, terminology - tất cả tiếng Việt.
    Chỉ giữ nguyên: tên thương hiệu (Grab, MoMo), thuật ngữ kỹ 
    thuật không có bản dịch tốt (CAC, LTV, CTR, KPI), tên người.
    Apply cùng "DECISION-GRADE STANDARD" cho v2.
    
    Check:
    - Fixes đã done chưa?
    - Contrarian insights còn không (không bị water down)?
    - Segmentation đạt chuẩn chưa?
    - Recommendation có đủ CAC + KPI chưa?
    - Chất lượng tổng đạt PASS chưa?
    
    Nếu vẫn REVISE/FAIL sau 2 lần → flag "NEED HUMAN REVIEW" 
    trong FINAL ASSESSMENT.
  expected_output: >
    Review report v2 cùng format, focus vào fix compliance.
  agent: quality_reviewer
  context:
    - revision_task

visualize_task:
  description: >
    🇻🇳 NGÔN NGỮ BẮT BUỘC: Toàn bộ output bằng TIẾNG VIỆT.
    Heading, label, body text, terminology - tất cả tiếng Việt.
    Chỉ giữ nguyên: tên thương hiệu (Grab, MoMo), thuật ngữ kỹ 
    thuật không có bản dịch tốt (CAC, LTV, CTR, KPI), tên người.

    Tạo HYBRID REPORT có cả Executive Quick View + Narrative 
    Deep Dive + Detailed Actions.
    
    CẤU TRÚC:
    
    # [Title có hook commercial + emotional]
    
    ═══════════════════════════════════════════════
    PHẦN 1 - EXECUTIVE QUICK VIEW (scan 60s)
    ═══════════════════════════════════════════════
    
    > **TL;DR (30 giây):** 
    > - Insight quan trọng nhất (1 câu)
    > - Contrarian finding (1 câu)
    > - Big opportunity (1 câu)
    
    ## 📋 Research Brief
    [Bảng: Domain, Topic, Market, User, Time Scope, Purpose]
    
    ## 👥 Segmentation Matrix
    [Bảng 5-7 persona: Size / Income / Trigger / Barrier / 
    Price Sensitivity / Preferred Format]
    
    ## ⚡ Key Insights at a Glance
    [5 bullets ngắn, 1 câu/insight - cho scan nhanh]
    
═══════════════════════════════════════════════
    PHẦN 2 - NARRATIVE DEEP DIVE (5-act story)
    ═══════════════════════════════════════════════
    
    QUAN TRỌNG: Toàn bộ heading và nội dung bằng TIẾNG VIỆT.
    KHÔNG dùng "Hidden Truth", "Big Bet", "Why Now". Dùng tên 
    tiếng Việt như sau:
    
    ## 🎬 Hồi 1: Bức tranh hiện tại
    [2-3 đoạn về cái ai cũng thấy, common understanding]
    [Set baseline, tone matter-of-fact]
    
    ## 🔍 Hồi 2: Sự thật ẩn giấu
    [Reveal contrarian insight mạnh nhất]
    [Support bằng hard data + human quote]
    [Tone: "đây là điều ít ai để ý..."]
    
    ## 🎯 Hồi 3: Cú đặt cược lớn
    [If true, opportunity là gì?]
    [Size + unit economics ngầm]
    [Position vs competitors]
    [Tone: visionary but grounded]
    
    ## ⏰ Hồi 4: Tại sao lại là lúc này?
    [Market shift, tech enabler, behavior change]
    [Window opportunity đang mở, 2 năm trước không work]
    [Tone: urgent, momentum]
    
    ## 🚀 Hồi 5: Cần làm gì ngay tuần tới?
    [Concrete actions next week]
    [First experiment + success criteria]
    [Tone: practical, executable]
    
    ═══════════════════════════════════════════════
    PHẦN 3 - DETAILED INSIGHTS & ACTIONS
    ═══════════════════════════════════════════════
    
    ## 💡 Full Actionable Insights
    
    ### Insight #1 [Causal/Contrarian]: [Hook title]
    [1-3 câu insight theo pattern 2-tầng]
    
    **Evidence:** [source + year + sample hoặc quote]
    **Commercial angle:** [opportunity + business math]
    
    ---
    [Lặp cho insights 2-5]
    
    ## ✅ Recommendations
    [Bảng chi tiết:
    | # | Priority | Action | Target Segment | Offer/Price | 
    | Channel | CAC Target | KPI Leading | KPI Lagging | Timeline |]
    
    ## ⚠️ Risks & Open Questions
    [Bullet points]
    
    ## 🗺️ Next 90 Days
    [3-5 action items ngắn]
    
    ---
    *Report generated by AI Research Agent*
    
    NGUYÊN TẮC:
    - Executive scan Phần 1 trong 60s
    - Founder/Strategy đọc Phần 2 cho inspiration
    - Team execute Phần 3 với full detail
    - Preserve insights 2-tầng + contrarian xuyên suốt
    
    Domain: {domain}, Time scope: {time_scope}
  expected_output: >
    Final document Markdown hybrid (clean + narrative + detailed),
    phục vụ cả executive (scan) và founder (read deep).
  agent: visualizer
  context:
    - revision_task
    - re_review_task