user_research_task:
  description: >
    Thực hiện research về: "{feature_name}" trong ngành fintech/super app.
    
    BRIEF:
    - Loại research: {research_type}
    - Thị trường: {market}
    - User segment: {user_segment}
    - Mục đích: {purpose}
    - Độ sâu: {depth}
    - Context thêm: {extra_context}
    
    Thu thập:
    1. Pain points và motivations
    2. User journey hiện tại
    3. So sánh competitor (MoMo, ZaloPay, GrabPay, etc.)
    4. Số liệu thị trường
    5. Trend và opportunity
  expected_output: >
    Báo cáo dữ liệu thô dạng Markdown, có section rõ ràng,
    tập trung đúng user segment và market đã brief.
  agent: ux_researcher

synthesis_task:
  description: >
    Từ báo cáo thô, tổng hợp insight report phù hợp với mục đích {purpose}.
    
    Cấu trúc bắt buộc:
    1. Executive Summary (3-5 câu)
    2. Top 5 Insights ưu tiên (kèm evidence)
    3. Opportunity Areas (3-5 cơ hội)
    4. Recommendations (3-5 khuyến nghị), mỗi cái có mô tả, priority, lý do, success metric
    5. Risks và Considerations
  expected_output: >
    Insight Report dạng Markdown, phù hợp trình bày với PM và Designer.
    Độ dài theo depth đã brief.
  agent: insight_synthesizer
  context:
    - user_research_task

review_task:
  description: >
    Review insight report theo checklist 8 tiêu chí dưới đây.
    Với mỗi tiêu chí, chấm 1-5 điểm và ghi feedback cụ thể.
    
    CHECKLIST:
    1. Độ chính xác dữ liệu (có nguồn, số liệu realistic, competitor đúng)
    2. Chiều sâu insight (có phân tích WHY, không generic)
    3. Tính actionable (recommendation có thể implement ngay)
    4. Context fintech Việt Nam và SEA (hiểu quy định, thói quen local)
    5. Cấu trúc và trình bày (heading, flow logic)
    6. Coverage đúng scope (đủ section yêu cầu)
    7. Tone và audience fit (phù hợp PM và Designer)
    8. Originality (không generic, có insight specific)
    
    QUYẾT ĐỊNH:
    - Total từ 32 đến 40 điểm -> PASS
    - Total từ 24 đến 31 điểm -> REVISE (list rõ điều cần sửa)
    - Total dưới 24 điểm -> FAIL (giải thích lý do)
    
    Output format bắt buộc gồm các phần sau, mỗi phần xuống dòng rõ ràng:
    
    REVIEW VERDICT (PASS hoặc REVISE hoặc FAIL)
    TOTAL SCORE (X trên 40)
    
    SCORES - điểm chi tiết 8 tiêu chí kèm feedback cho mỗi tiêu chí
    
    TOP STRENGTHS - liệt kê các điểm mạnh của report
    
    REQUIRED FIXES - liệt kê các điều cần sửa (nếu REVISE hoặc FAIL)
    
    FINAL ASSESSMENT - 1-2 câu kết luận tổng quan
  expected_output: >
    Review report bằng tiếng Việt, thẳng thắn, có lý do rõ ràng,
    tuân thủ đúng format các section đã yêu cầu.
  agent: quality_reviewer
  context:
    - synthesis_task

visualize_task:
  description: >
    Chuyển insight report thành document cuối cùng với formatting chuyên nghiệp.
    
    Cấu trúc document bắt buộc:
    
    Tiêu đề chính là tên feature (dùng # heading cấp 1)
    
    TL;DR (dùng blockquote, 3 câu tóm tắt toàn bộ insight)
    
    Section Research Brief - bảng thông tin brief ngắn gọn
    
    Section Executive Summary - 5-7 bullet points key takeaways
    
    Section Key Insights - 5 insights, mỗi cái có heading cấp 3, 
    format gồm Finding, Evidence, So what
    
    Section Opportunity Areas - bullet points hoặc bảng
    
    Section Recommendations - bảng với columns Priority, Recommendation, 
    Rationale, Success Metric
    
    Section Risks and Considerations - bullet points
    
    Section Next Steps - 3-5 actionable bullets
    
    Footer là dòng note Report generated by AI UX Research Agent
    
    Sử dụng:
    - Emoji icons vừa phải cho heading
    - Bold cho keywords quan trọng
    - Tables cho dữ liệu so sánh
    - Blockquotes cho quotes và callouts
    - Horizontal rule để phân chia section
  expected_output: >
    Final document dạng Markdown được format đẹp, professional,
    ready-to-share với stakeholder.
  agent: visualizer
  context:
    - synthesis_task
    - review_task