user_research_task:
  description: >
    🇻🇳 NGÔN NGỮ: Toàn bộ output bằng TIẾNG VIỆT.
    Chỉ giữ nguyên: tên brand, technical terms (CAC, LTV, KPI, JTBD)
    
    Research về: "{feature_name}"
    
    📋 BRIEF:
    - Research Type: {research_type}
    - Domain: {domain}
    - Time Scope: {time_scope}
    - Market: {market}
    - User Hint: {user_segment}
    - Purpose: {purpose}
    - Depth: {depth}
    - Extra Context: {extra_context}
    
    🎯 ADAPTIVE METHODOLOGY:
    
    Bạn ĐỌC research_type ({research_type}) và apply methodology 
    phù hợp đã được trained trong backstory của bạn:
    
    - Feature research → JTBD + User Journey + Friction Audit
    - User segment → Persona Profiling + Switching Triggers
    - Market/Competitor → CONSULTING-GRADE FRAMEWORK 4 PARTS:
       PART 1 - Executive Summary (3 câu hỏi cốt lõi)
       PART 2 - Player Overview (DNA + Scale + Position + 
                Ecosystem + Growth + Milestones)
       PART 3 - Success Factor Analysis (AIDA Funnel + 
                Product vs External + 3C + CSFs)
       PART 4 - Implications (Threat/Learn/Copy/Counter per player)
    - Trend research → PESTEL + Signals→Trends + 3 Horizons
    
    Sources cũng adapt theo type (xem backstory).
    
    🔄 NGUYÊN TẮC CHUNG:
    1. Mix hard data (quantitative) + human truth (qualitative)
    2. Mọi claim có source hoặc flag [needs verification]
    3. Decompose qua Issue Tree (>= 3 tầng)
    4. Slice data theo segment/income/geo (không tổng thể)
    5. Tìm weird workarounds, contrarian signals
  expected_output: >
    Raw research data Markdown, structure adapt theo research_type.
    Nội dung phong phú, có evidence, có quotes, có decomposition.
  agent: ux_researcher

synthesis_task:
  description: >
    🇻🇳 NGÔN NGỮ: TIẾNG VIỆT toàn bộ.
    
    Từ research data, xây 5 INSIGHTS theo dạng PHÙ HỢP với 
    research_type ({research_type}):
    
    🎯 Feature research → Pattern: Behavior + Reason + Consequence
    👥 User segment → Pattern: Persona + Driver + Pattern + Gap
    💼 Market → Pattern: Dynamic + Implication + Move
    🔮 Trend → Pattern: Signal + Driver + Trajectory + Implication
    
    (Xem chi tiết pattern trong backstory)
    
    BẮT BUỘC:
    - 3-4 causal insights theo pattern phù hợp
    - 1-2 contrarian insights (non-obvious truth)
    - Mỗi insight có: segment cụ thể, why-chain >= 3 tầng, 
      evidence, quantification, actionable
    
    OUTPUT STRUCTURE:
    
    1. Executive Summary (3 câu)
    
    2. Segmentation/Landscape Overview
       (table phù hợp với research type:
       - Feature: personas affected
       - Segment: full personas matrix
       - Market: competitor map
       - Trend: signals matrix)
    
    3. Top 5 Insights (3-4 causal + 1-2 contrarian)
    
    4. Strategic Opportunities (3-5)
    
    5. Recommendations (3-5)
       Chọn format A/B/C/D/E phù hợp với purpose & research_type:
       - Option A (commercial): Validate idea, GTM
       - Option B (product): Improve feature, UX fix
       - Option C (signals): Trend research, exploratory
       - Option D (strategic): Competitor, positioning
       - Option E (free-form): Mix complex
       
       Ghi rõ: > **Format: Option [X] - [lý do chọn]**
    
    6. Risks & Open Questions
    
    Domain: {domain}, Time scope: {time_scope}
  expected_output: >
    Insight Report v1 với insights pattern adapt theo research type,
    recommendations format phù hợp purpose.
  agent: insight_synthesizer
  context:
    - user_research_task

review_task:
  description: >
    🇻🇳 NGÔN NGỮ: TIẾNG VIỆT.
    
    Review insight report với 7-POINT TEST PHÙ HỢP với research_type 
    ({research_type}):
    
    🎯 Feature research test:
    1. User segment cụ thể? 2. Trigger/touchpoint? 3. Psychological 
    reason? 4. Observable behavior + quantify? 5. Product impact? 
    6. User quote/evidence? 7. Ah-ha moment?
    
    👥 User segment test:
    1. Persona đủ 4D? 2. Psychological driver? 3. Behavioral pattern? 
    4. Market gap? 5. Size estimate? 6. Distinguishable? 
    7. Implied strategy?
    
    💼 Market test:
    1. Market dynamic specific? 2. Driving forces + evidence? 
    3. Quantified market data? 4. Strategic implication? 
    5. Competitive positioning? 6. Move recommendation? 
    7. Timeframe/trajectory?
    
    🔮 Trend test:
    1. Specific signal? 2. Underlying driver? 3. Trajectory + 
    timeframe? 4. Confidence level flagged? 5. Scenario thinking? 
    6. Strategic implication? 7. Non-obvious element?
    
    BẮT BUỘC CHECK:
    - >= 1 contrarian insight không?
    - Recommendations format đúng theo purpose chưa?
    - Evidence có source không?
    
    DECISION:
    - 5/5 insights >= 5/7 + có contrarian: PASS
    - 3-4/5 insights >= 4/7: REVISE
    - Còn lại: FAIL
    
    OUTPUT:
    REVIEW VERDICT: [PASS | REVISE | FAIL]
    RESEARCH TYPE: {research_type}
    
    INSIGHTS ASSESSMENT:
    Insight #1: "[10 từ đầu]..."
    - 7 tests theo type
    - Score: N/7
    [Repeat]
    
    CONTRARIAN CHECK
    RECOMMENDATIONS CHECK (format đúng?)
    CRITICAL FIXES (specific)
    FINAL ASSESSMENT
  expected_output: >
    Review report TIẾNG VIỆT, criteria adapt theo research_type.
  agent: quality_reviewer
  context:
    - synthesis_task

revision_task:
  description: >
    🇻🇳 TIẾNG VIỆT.
    
    Sửa theo CRITICAL FIXES từ reviewer. Apply criteria phù hợp 
    research_type {research_type}.
    
    Giữ nguyên:
    - Phần đã PASS
    - Contrarian insights (không water down)
    - Format recommendations option đã chọn (nếu đúng)
    
    Sửa:
    - Insights bị flag fail test nào → bổ sung element đó
    - Recommendations format sai → đổi sang option phù hợp
    - Evidence thiếu → tìm source hoặc flag [needs verification]
    
    Đầu report thêm: ## 📝 REVISION NOTES
    Ghi rõ đã fix gì.
    
    Domain: {domain}, Time scope: {time_scope}
  expected_output: >
    Insight Report v2 với fixes applied + REVISION NOTES.
  agent: insight_synthesizer
  context:
    - synthesis_task
    - review_task

re_review_task:
  description: >
    🇻🇳 TIẾNG VIỆT.
    
    Review v2 với cùng 7-POINT TEST của research_type ({research_type}).
    
    Check:
    - Fixes done?
    - Contrarian preserved?
    - Format recommendations đúng option?
    - Quality đạt PASS?
    
    Nếu fail sau 2 lần → flag "NEED HUMAN REVIEW".
  expected_output: >
    Review report v2.
  agent: quality_reviewer
  context:
    - revision_task

visualize_task:
  description: >
    🇻🇳 NGÔN NGỮ: TIẾNG VIỆT toàn bộ.
    Chỉ giữ: brand names, technical terms (CAC, LTV, KPI, etc.)
    
    Tạo FINAL REPORT với structure PHÙ HỢP với research_type 
    ({research_type}):
    
    🎯 Feature research structure:
    1. TL;DR (3 câu)
    2. Tóm tắt Research Brief
    3. Personas bị ảnh hưởng
    4. Bản đồ User Journey (current state)
    5. Pain Points chính (insights)
    6. Workarounds phát hiện
    7. [5-Act Narrative section]
    8. Đề xuất cải tiến (Option B format)
    9. Test Plan
    10. Rủi ro
    
    👥 User segment structure:
    1. TL;DR
    2. Tóm tắt Research Brief
    3. Tổng quan Phân khúc (table 5-7 personas)
    4. Đào sâu Persona (mỗi persona 1 section)
    5. [5-Act Narrative section]
    6. Insights chéo phân khúc
    7. Chiến lược Targeting (Option B/E)
    8. Rủi ro per segment
    
   💼 Market/Competitor structure (CONSULTING DECK STYLE):
    1. Executive Summary - Trả lời 3 câu cốt lõi:
       - Đối thủ là ai và mạnh cỡ nào?
       - Tại sao họ thành công?
       - Ý nghĩa gì với chúng ta?
    
    2. Tóm tắt Research Brief
    
    3. Tổng quan Đối thủ (Player Overview):
       - Bảng so sánh tổng thể
       - Đào sâu từng player (DNA + Scale + Position + 
         Ecosystem + Growth + Milestones)
    
    4. Giải mã Thành công (Success Factor Analysis):
       - Framework A: Awareness → Trial → Usage Funnel
       - Framework B: Product vs External Factors
       - Framework C: 3C Analysis (Customer/Company/Competitor)
       - Critical Success Factors (CSFs) cho industry
    
    5. Hàm ý cho Chúng ta (Implications):
       - Bảng tổng hợp Threat/Learn/Copy/Counter
       - Đào sâu cho Top 3 threats
    
    6. [5-Act Narrative section]
    
    7. Watchlist - Tín hiệu cần theo dõi
    
    8. Rủi ro
    
    Tone: management consulting, analytical, board-ready
    
    🔮 Trend research structure:
    1. TL;DR
    2. Tóm tắt Research Brief
    3. Tín hiệu phát hiện (weak signals)
    4. Driving Forces (PESTEL)
    5. Trajectory (3 horizons)
    6. Scenario Planning
    7. [5-Act Narrative section]
    8. Trends ưu tiên (insights)
    9. Hàm ý Chiến lược (Option C)
    10. Hedging Strategy
    
    ═══════════════════════════════════════════════
    [5-ACT NARRATIVE SECTION] (chung cho mọi type):
    ═══════════════════════════════════════════════
    
    ## 🎬 Hồi 1: Bức tranh hiện tại
    [Set baseline, ai cũng biết]
    
    ## 🔍 Hồi 2: Sự thật ẩn giấu
    [Reveal contrarian insight mạnh nhất]
    
    ## 🎯 Hồi 3: Cú đặt cược lớn
    [Opportunity nếu đúng]
    
    ## ⏰ Hồi 4: Tại sao là lúc này?
    [Why now - timing]
    
    ## 🚀 Hồi 5: Cần làm gì ngay tuần tới?
    [Concrete actions]
    
    ═══════════════════════════════════════════════
    
    QUY TẮC FORMAT MARKDOWN:
    
    1. TABLE: Mỗi row 1 dòng riêng, có separator |---|---|
    2. CELL: < 60 ký tự, không line break trong cell
    3. SỐ TIỀN: viết gọn ("2tr", "500k", "$50k")
    4. TIME: "4 tuần", "Q1 2026"
    5. % : "30%" không "0.3"
    
    RECOMMENDATIONS FORMAT - Chọn option phù hợp:
    
    > **Format: Option [A/B/C/D/E] - [lý do]**
    
    Option A (commercial/launch):
    | # | Priority | Hành động | Đối tượng | Đầu tư | Kênh | Chỉ số đo | Timeline |
    
    Option B (product/UX):
    | # | Priority | Cải tiến | Insight liên quan | Effort | Impact | Owner |
    
    Option C (trend/signals):
    | # | Priority | Hướng theo dõi | Lý do | Hành động | Khi nào revisit |
    
    Option D (strategic/competitor):
    | # | Priority | Strategic move | Lý do | Risk khi không làm | Tín hiệu thành công |
    
    Option E (free-form): numbered list với bullets
    
    Sau bảng, có "Đào sâu Recommendation #1" - 3-5 bullet sâu.
    
    Domain: {domain}, Time scope: {time_scope}
  expected_output: >
    Final document Markdown, structure adapt theo research_type,
    có 5-act narrative, recommendations đúng format option.
  agent: visualizer
  context:
    - revision_task
    - re_review_task